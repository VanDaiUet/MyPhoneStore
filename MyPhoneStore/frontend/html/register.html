<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>Đăng ký tài khoản</title>
</head>
<body>
    <div class="register-container">
        <div class="left">
            <img src="../images/logo.png" alt="logo">
        </div>
        <div class="right">
            <form class="register">
                <h2>Đăng ký</h2>
                <input id="name" type="text" placeholder="Nhập họ và tên">
                <input id="email" type="text" placeholder="Nhập email của bạn">
                <input id="username" type="text" placeholder="Nhập tên đăng nhập">
                <input id="password" type="password" placeholder="Nhập mật khẩu">
                <button type="button" onclick="signup()" id="register-button">Đăng ký</button>
                <div class="login-link">
                    Bạn đã có tài khoản? <a href="./login.html">Đăng nhập ngay</a>
                </div>
            </form>
        </div>
    </div>
    <script src="../js/register.js"></script>
</body>
</html>
